<!DOCTYPE html><html lang="sk"><head><meta charset="utf-8"><link rel="stylesheet" href="./tokens.css">
<style>
body{font-family:var(--font-family);background:var(--color-bg);padding:24px;margin:0}
h3{font-size:13px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:120px;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-card);background:#fff}
.sw>div:first-child{height:52px}
.sw span{display:block;font-size:11px;padding:6px 8px;color:var(--color-text-body)}
</style></head><body>
<h3>Základ</h3>
<div class="row">
  <div class="sw"><div style="background:var(--color-bg)"></div><span>bg #f1f5f9</span></div>
  <div class="sw"><div style="background:var(--color-primary)"></div><span>primary #2563eb</span></div>
  <div class="sw"><div style="background:var(--color-primary-bg)"></div><span>primary-bg #eff6ff</span></div>
  <div class="sw"><div style="background:var(--color-text)"></div><span>text #0f172a</span></div>
  <div class="sw"><div style="background:var(--color-text-muted)"></div><span>muted #94a3b8</span></div>
</div>
<h3>Sémantické</h3>
<div class="row">
  <div class="sw"><div style="background:var(--color-success)"></div><span>úspora #16a34a</span></div>
  <div class="sw"><div style="background:var(--color-promo)"></div><span>akcia beží #dc2626</span></div>
  <div class="sw"><div style="background:var(--color-upcoming)"></div><span>akcia príde #b45309</span></div>
  <div class="sw"><div style="background:var(--color-warn-bg)"></div><span>warn-bg #fffbeb</span></div>
</div>
<h3>Obchody</h3>
<div class="row">
  <div class="sw"><div style="background:var(--store-lidl)"></div><span>Lidl</span></div>
  <div class="sw"><div style="background:var(--store-kaufland)"></div><span>Kaufland</span></div>
  <div class="sw"><div style="background:var(--store-tesco)"></div><span>Tesco</span></div>
  <div class="sw"><div style="background:var(--store-billa)"></div><span>Billa</span></div>
  <div class="sw"><div style="background:var(--store-terno)"></div><span>Terno</span></div>
  <div class="sw"><div style="background:var(--store-fresh)"></div><span>Fresh</span></div>
</div>
</body></html>
